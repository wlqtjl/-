# ======== HTTP 配置 ========
# 域名访问时，将 HTTP 重定向到 HTTPS（需先完成 certbot 配置）。
# certbot ACME 验证路径始终保留在 HTTP 以支持证书签发和续期。
server {
    listen 80;
    server_name wozai.org www.wozai.org;

    # Let's Encrypt 证书验证路径（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 备案期间可先注释掉下面这行，直接用 HTTP 反代（取消注释下方 location / 块）
    return 301 https://$host$request_uri;

    # --- 备案期间临时 HTTP 反代（HTTPS 配好后删除此块） ---
    # location / {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Connection "";
    #     proxy_buffering off;
    # }
}

# IP 直接访问（备案期间或无域名时使用）
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    access_log /var/log/nginx/wozai_access.log;
    error_log  /var/log/nginx/wozai_error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # 静态文件缓存（CSS/JS/字体）
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

